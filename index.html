<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UBB Begehungsprotokoll 0.4.17</title>
  <style>
    :root{--bg:#f6f7f9;--card:#fff;--text:#15171a;--muted:#68707c;--accent:#1976d2;--danger:#c62828;--line:#d9dde3;--soft:#eef5ff}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--line);padding:12px 14px;display:flex;gap:10px;align-items:center;justify-content:space-between}
    h1{font-size:18px;margin:0}.wrap{max-width:920px;margin:0 auto;padding:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 0;box-shadow:0 1px 2px rgba(0,0,0,.03)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:700px){.grid{grid-template-columns:1fr}.hide-mobile{display:none}}
    label{font-weight:700;font-size:13px;margin-top:8px;display:block} input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:16px;margin-top:5px} textarea{min-height:88px} input[type=file]{padding:9px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.spacer{flex:1}
    button{border:0;border-radius:12px;padding:12px 14px;font-weight:700;font-size:15px;background:var(--accent);color:#fff;cursor:pointer} button.secondary{background:#eef0f3;color:#17202a} button.danger{background:var(--danger)} button.ghost{background:transparent;color:var(--accent);padding:8px} button.big{font-size:20px;padding:18px;width:100%;border-radius:18px}.plus{font-size:30px;vertical-align:-3px;margin-right:8px}.tabbar{display:flex;gap:8px;overflow:auto;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line)}.tabbar button{white-space:nowrap;background:#eef0f3;color:#17202a}.tabbar button.active{background:var(--accent);color:#fff}
    .muted{color:var(--muted);font-size:13px}.pill{display:inline-block;background:var(--soft);border:1px solid #cfe4ff;border-radius:999px;padding:6px 10px;margin:3px;font-size:13px}.list-item{border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0;background:#fff}.redbox{border:2px solid #c62828;background:#fff5f5;padding:12px;border-radius:8px}.photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}.photos img{width:100%;height:110px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}.hidden{display:none!important}.success{background:#ecf8ef;border:1px solid #bfe5c7;color:#245b2e;padding:10px;border-radius:10px}.inline-success{display:inline-block;background:#ecf8ef;border:1px solid #bfe5c7;color:#245b2e;padding:8px 10px;border-radius:10px;font-size:13px;font-weight:700}.emp-summary{cursor:pointer;font-weight:700;display:flex;gap:8px;align-items:center;justify-content:space-between}.emp-summary::-webkit-details-marker{display:none}.check{color:#2e7d32;font-weight:800}.warn{background:#fff8e1;border:1px solid #f2d27b;color:#6b4b00;padding:10px;border-radius:10px}
  </style>
</head>
<body>
<header><h1>UBB Begehungsprotokoll</h1><button class="secondary" onclick="saveNow()">Speichern</button></header>
<nav class="tabbar" id="tabs"></nav>
<main class="wrap" id="app"></main>

<script>
const KEY='ubb_html_app_04';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
let state=load()||{company:{name:'',address:'',phone:'',email:'',website:'',open:true},employees:[],projects:[],inspections:[],settings:{apiKey:'',apiKeySaved:false,model:'gpt-4o-mini'},activeInspectionId:null};
if(state.company && state.company.open===undefined) state.company.open = !state.company.name;
if(state.settings && state.settings.apiKeySaved===undefined) state.settings.apiKeySaved = !!state.settings.apiKey;
let page='home';
let flashTarget={};
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch(e){return null}}
let storageWarningShown=false;
function save(){
  try{
    localStorage.setItem(KEY,JSON.stringify(state));
    return true;
  }catch(e){
    console.error('Lokales Speichern fehlgeschlagen:', e);
    if(!storageWarningShown){
      storageWarningShown=true;
      alert('Die Daten konnten auf diesem Gerät nicht vollständig gespeichert werden. Häufige Ursache sind zu große Fotos im Browser-Speicher. Neue Fotos werden ab jetzt automatisch verkleinert. Bitte ggf. sehr große/alte Fotos entfernen oder die GitHub-Datensicherung nutzen.');
    }
    return false;
  }
}
function saveNow(msg='✅ Gespeichert.'){save(); toast(msg)}
function saveArea(key,msg){save(); flashTarget[key]=msg; render(); setTimeout(()=>{delete flashTarget[key]; render()},2200)}
function toast(msg){const d=document.createElement('div');d.className='success';d.textContent=msg;document.querySelector('.wrap').prepend(d);setTimeout(()=>d.remove(),1800)}
function esc(s){return (s||'').toString().replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function escAttr(s){return esc(s).replace(/\"/g,'&quot;').replace(/'/g,'&#39;')}
function byId(arr,id){return arr.find(x=>x.id===id)}
function nav(){const tabs=[['home','Start'],['company','Büro'],['dataServer','Daten/Server'],['projects','Projekte'],['inspections','Begehungen']];document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="${page===t[0]?'active':''}" onclick="page='${t[0]}';render()">${t[1]}</button>`).join('')}
function render(){save();nav();({home,company,dataServer,projects,inspections}[page]||home)()}
function home(){const open=state.inspections.filter(i=>i.status!=='abgeschlossen').length;document.getElementById('app').innerHTML=`
  <button class="big" onclick="newInspectionStart()"><span class="plus">＋</span>Neue Begehung</button>
  <div class="card"><h2>Übersicht</h2><p class="muted">Offene Begehungen: ${open}</p><p class="muted">Projekte: ${state.projects.length} · Mitarbeiter: ${state.employees.length}</p></div>
  <div class="card"><h2>Letzte Begehungen</h2>${state.inspections.slice(-5).reverse().map(i=>inspectionCard(i)).join('')||'<p class="muted">Noch keine Begehung angelegt.</p>'}</div>`}
function company(){const c=state.company||{}; const cname=esc(c.name||'Eigene Firma'); const csaved=flashTarget['company']?`<span class="inline-success">${flashTarget['company']}</span>`:''; document.getElementById('app').innerHTML=`<details class="card" ${c.open?'open':''} ontoggle="state.company.open=this.open;save()"><summary class="emp-summary"><h2 style="margin:0">${cname} <span class="check">✓</span></h2>${csaved}</summary>
 <div style="margin-top:12px">${inp('Firmenname','company.name')} ${ta('Anschrift','company.address')} <div class="grid">${inp('Telefon','company.phone')}${inp('E-Mail','company.email')}${inp('Website','company.website')}</div><div class="row"><button class="secondary" onclick="saveCompany(event)">Firma speichern</button>${flashTarget['company-btn']?`<span class="inline-success">${flashTarget['company-btn']}</span>`:''}</div></div></details>
 <div class="card"><h2>Mitarbeiter (${state.employees.length})</h2><div id="emplist">${state.employees.map(empCard).join('')||'<p class="muted">Noch keine Mitarbeiter.</p>'}</div><button onclick="addEmployee()">+ Mitarbeiter hinzufügen</button></div>`; bindInputs()}

function dataServer(){document.getElementById('app').innerHTML=`
 <div class="card"><h2>OpenAI API</h2><p class="muted">Der API-Key wird nur lokal in deinem Browser gespeichert und nur für die KI-Textgenerierung verwendet.</p>${state.settings.apiKeySaved ? `<div class="success">✓ API-Key gespeichert</div><button class="secondary" onclick="state.settings.apiKeySaved=false; render();">API-Key ändern</button>` : `<label>OpenAI API-Key</label><input type="password" id="apiKeyInput" placeholder="OpenAI API-Key eingeben" autocomplete="off">`}${inp('Modell','settings.model')}<div class="row"><button class="secondary" onclick="saveApiSettings(event)">API speichern</button>${flashTarget['api-settings']?`<span class="inline-success">${flashTarget['api-settings']}</span>`:''}</div></div>
 <div class="card"><h2>Daten sichern / wiederherstellen</h2><p class="muted">Sichert Firma, Mitarbeiter, Projekte, Begehungen, Feststellungen und lokal gespeicherte Fotos als JSON-Datei.</p><h3>GitHub-Datensicherung</h3><p class="muted">Die gesamten App-Daten werden beim Protokoll-Upload automatisch unter <b>App-Daten/ubb_daten.json</b> im GitHub-Repository gesichert. Mit dem Button unten kannst du diese Daten auf einem anderen Gerät direkt wiederherstellen.</p><div class="row"><button class="secondary" id="loadAppDataGithubBtn" onclick="restoreAppDataFromGithub(this)">↩ App-Daten aus GitHub wiederherstellen</button>${flashTarget['github-app-data']?`<span class="inline-success">${flashTarget['github-app-data']}</span>`:''}</div><p class="warn">Wichtig: Wiederherstellen aus GitHub ersetzt die aktuell im Browser gespeicherten Daten.</p><h3>Lokale Sicherungsdatei</h3><p class="muted">Zusätzliche Notfall-Sicherung als Datei auf deinem Gerät.</p><div class="row"><button class="secondary" onclick="exportData()">💾 Lokale JSON-Datei sichern</button><label style="margin:0"><span class="secondary" style="display:inline-block;border-radius:12px;padding:12px 14px;font-weight:700;background:#eef0f3;color:#17202a;cursor:pointer">📂 Lokale JSON-Datei wiederherstellen</span><input type="file" accept="application/json" onchange="importData(this.files[0])" style="display:none"></label></div><p class="warn">Wichtig: Auch die lokale Wiederherstellung ersetzt die aktuell im Browser gespeicherten Daten.</p>${githubConfigPanel()}</div>`; bindInputs()}


function saveApiSettings(ev){
  if(ev) ev.preventDefault();
  const apiInput=document.getElementById('apiKeyInput');
  if(apiInput && apiInput.value.trim()){
    state.settings.apiKey=apiInput.value.trim();
  }
  state.settings.apiKeySaved=!!state.settings.apiKey;
  saveArea('api-settings','✅ API gespeichert');
}
function saveCompany(ev){if(ev) ev.preventDefault(); state.company.open=false; saveArea('company','✅ Firma gespeichert')}
function empCard(e){const key='emp-'+e.id; const name=esc(e.name||'Neuer Mitarbeiter'); const saved=flashTarget[key]?`<span class="inline-success">${flashTarget[key]}</span>`:''; return `<details class="list-item" ${e.open?'open':''}><summary class="emp-summary"><span>${name} <span class="check">✓</span></span>${saved}</summary><div class="grid">${rawInp('Name',e.name,`setEmp('${e.id}','name',this.value)`)}${rawInp('Funktion',e.role,`setEmp('${e.id}','role',this.value)`)}${rawInp('E-Mail',e.email,`setEmp('${e.id}','email',this.value)`)}${rawInp('Telefon',e.phone,`setEmp('${e.id}','phone',this.value)`)}</div><div class="row"><button class="secondary" onclick="saveEmployee('${e.id}')">Mitarbeiter speichern</button><button class="danger" onclick="delEmp('${e.id}')">Löschen</button></div></details>`}
function saveEmployee(id){const e=byId(state.employees,id); if(e) e.open=false; saveArea('emp-'+id,'✅ Mitarbeiter gespeichert')}
function addEmployee(){state.employees.push({id:uid(),name:'',role:'Umweltfachliche Bauüberwachung',email:'',phone:'',open:true});render(); toast('Neuer Mitarbeiter angelegt – bitte ausfüllen und speichern.')} function setEmp(id,k,v){byId(state.employees,id)[k]=v;save()} function delEmp(id){state.employees=state.employees.filter(e=>e.id!==id);render()}
function projects(){document.getElementById('app').innerHTML=`<div class="card"><h2>Projekte (${state.projects.length})</h2><button onclick="addProject()">+ Neues Projekt</button>${state.projects.map(projectCard).join('')||'<p class="muted">Noch kein Projekt.</p>'}</div>`}
function projectCard(p){const key='proj-'+p.id; const name=esc(p.name||'Neues Projekt'); const saved=flashTarget[key]?`<span class="inline-success">${flashTarget[key]}</span>`:''; return `<details class="list-item" ${p.open?'open':''} ontoggle="setProjectOpen('${p.id}',this.open)"><summary class="emp-summary"><span>${name} <span class="check">✓</span></span>${saved}</summary><div style="margin-top:12px"><div class="grid">${rawInp('Projektname',p.name,`setProj('${p.id}','name',this.value)`)}${rawInp('Projektnummer',p.number,`setProj('${p.id}','number',this.value)`)}${rawInp('Auftraggeber',p.client,`setProj('${p.id}','client',this.value)`)}${rawInp('Ort / Raum / Strecke',p.location,`setProj('${p.id}','location',this.value)`)}</div>${rawTa('Projekthinweise',p.notes,`setProj('${p.id}','notes',this.value)`)}<h4>Verteiler (${(p.distribution||[]).length})</h4><div>${(p.distribution||[]).map((d,idx)=>distRow(p.id,idx,d)).join('')||'<p class="muted">Kein Verteiler eingetragen.</p>'}</div><div class="row"><button class="secondary" onclick="addDist('${p.id}')">+ Verteiler hinzufügen</button><button class="secondary" onclick="saveArea('dist-${p.id}','✅ Verteiler gespeichert')">Verteiler speichern</button>${flashTarget['dist-'+p.id]?`<span class="inline-success">${flashTarget['dist-'+p.id]}</span>`:''}</div><h4>Standardteilnehmer</h4>${employeeCheckboxes(p.standardParticipants||[],`toggleStdPart('${p.id}',`) }<br><div class="row"><button class="secondary" onclick="saveProject('${p.id}')">Projekt speichern</button><button class="danger" onclick="delProj('${p.id}')">Projekt löschen</button></div></div></details>`}
function saveProject(id){const p=byId(state.projects,id); if(p) p.open=false; saveArea('proj-'+id,'✅ Projekt gespeichert')}
function setProjectOpen(id,isOpen){const p=byId(state.projects,id); if(p){p.open=isOpen; save()}}
function distRow(pid,idx,d){return `<div class="grid list-item">${rawInp('Name',d.name,`setDist('${pid}',${idx},'name',this.value)`)}${rawInp('Firma',d.company,`setDist('${pid}',${idx},'company',this.value)`)}${rawInp('Funktion',d.role,`setDist('${pid}',${idx},'role',this.value)`)}${rawInp('E-Mail',d.email,`setDist('${pid}',${idx},'email',this.value)`)}<button class="danger" onclick="delDist('${pid}',${idx})">Entfernen</button></div>`}
function addProject(){state.projects.push({id:uid(),name:'',number:'',client:'',location:'',notes:'',distribution:[],standardParticipants:[],open:true});render(); toast('Neues Projekt angelegt – bitte ausfüllen und speichern.')} function setProj(id,k,v){byId(state.projects,id)[k]=v;save()} function delProj(id){state.projects=state.projects.filter(p=>p.id!==id);render()} function addDist(pid){const p=byId(state.projects,pid); p.open=true; p.distribution.push({name:'',company:'',role:'',email:''});render(); toast('Neuer Verteiler-Eintrag angelegt – bitte ausfüllen und speichern.')} function setDist(pid,i,k,v){byId(state.projects,pid).distribution[i][k]=v;save()} function delDist(pid,i){byId(state.projects,pid).distribution.splice(i,1);render()} function toggleStdPart(pid,eid){let a=byId(state.projects,pid).standardParticipants||[];a.includes(eid)?a.splice(a.indexOf(eid),1):a.push(eid);byId(state.projects,pid).standardParticipants=a;render()}
function newInspectionStart(){page='inspections'; state.activeInspectionId=null; renderNewInspection()}
function inspections(){if(state.activeInspectionId) return editInspection(state.activeInspectionId); document.getElementById('app').innerHTML=`<button class="big" onclick="renderNewInspection()"><span class="plus">＋</span>Neue Begehung</button><div class="card"><h2>Alle Begehungen</h2>${state.inspections.slice().reverse().map(inspectionCard).join('')||'<p class="muted">Noch keine Begehung.</p>'}</div>`}
function inspectionCard(i){const p=byId(state.projects,i.projectId)||{};return `<details class="list-item"><summary class="emp-summary"><span>${esc(i.date)} – ${esc(p.name)||'Projekt unbekannt'}</span><span class="muted">${esc(i.topic)}</span></summary><div style="margin-top:10px"><p class="muted">Uhrzeit: ${esc(i.time)} · Witterung: ${esc(i.weather)} · Feststellungen: ${(i.findings||[]).length}</p><div class="row"><button class="secondary" onclick="openInspection('${i.id}')">Öffnen</button><button class="secondary" onclick="editInspectionDetails('${i.id}')">✏ Begehung bearbeiten</button><button class="danger" onclick="deleteInspection('${i.id}')">🗑 Begehung löschen</button><button class="secondary" onclick="exportProtocol('${i.id}')">📄 Protokoll erstellen</button><button class="secondary" data-action="save-github" onclick="saveProtocolToGithub('${i.id}', this)">☁ Nach GitHub speichern</button></div></div></details>`}
function openInspection(id){state.activeInspectionId=id;page='inspections';render()}
function deleteInspection(id){const i=byId(state.inspections,id);const p=byId(state.projects,i?.projectId)||{};if(!confirm(`Begehung vom ${i?.date||''} – ${p.name||'Projekt'} wirklich löschen?

Alle zugehörigen Feststellungen und Fotos werden ebenfalls entfernt.`)) return; state.inspections=state.inspections.filter(x=>x.id!==id); if(state.activeInspectionId===id) state.activeInspectionId=null; save(); render(); toast('✅ Begehung gelöscht')}
function toggleOtherTopic(){const sel=document.getElementById('newTopic')||document.getElementById('editTopic'); const wrap=document.getElementById('otherTopicWrap')||document.getElementById('editOtherTopicWrap'); if(!sel||!wrap) return; wrap.style.display=sel.value==='Anderes Thema'?'block':'none'}
function renderNewInspection(){const me=state.employees[0]?.id||'';tempParts=me?[me]:[];document.getElementById('app').innerHTML=`<div class="card"><h2>Neue Begehung</h2><label>Projekt</label><select id="newProject" onchange="prefillParticipants()"><option value="">Bitte auswählen</option>${state.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select><div class="grid"><div><label>Thema</label><select id="newTopic" onchange="toggleOtherTopic()"><option>Baustellenbegehung</option><option>Begleitung von Arbeiten</option><option>Kartierung</option><option>Anderes Thema</option></select></div><div id="otherTopicWrap" style="display:none"><label>Bezeichnung des Themas</label><input id="newOtherTopic" type="text" placeholder="z. B. Abstimmung mit EBA, Nachkontrolle..."></div><div><label>Datum</label><input id="newDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div><label>Uhrzeit</label><input id="newTime" type="text" value="${new Date().toTimeString().slice(0,5)}"></div><div><label>Witterung</label><input id="newWeather" type="text" placeholder="wird automatisch ermittelt"><button type="button" class="secondary" onclick="autoWeather()">Witterung aktualisieren</button><div id="weatherFeedback" class="hint"></div></div><div><label>Protokollführung</label><input id="newProtocolLead" type="text" value="${esc(state.employees[0]?.name||'')}"></div></div><label>Bemerkung</label><textarea id="newRemark"></textarea><h3>Teilnehmer</h3><div id="newParts">${employeeCheckboxes(tempParts, 'toggleNewPart(')}</div><h3>Fotos zur Begehung</h3><p class="muted">Du kannst vorhandene Dateien auswählen oder direkt mit dem iPhone ein Foto aufnehmen.</p><label>Aus Dateien / Fotomediathek auswählen</label><input type="file" accept="image/*" multiple id="inspectionFiles"><label>Direkt Foto aufnehmen</label><input type="file" accept="image/*" capture="environment" multiple id="inspectionCamera"><button onclick="createInspection()">Begehung anlegen</button></div>`; setTimeout(autoWeather,300)}
let tempParts=[];function prefillParticipants(){const pid=document.getElementById('newProject').value;const p=byId(state.projects,pid);tempParts=[...(p?.standardParticipants||[])]; if(!tempParts.length && state.employees[0]) tempParts=[state.employees[0].id]; document.getElementById('newParts').innerHTML=employeeCheckboxes(tempParts,'toggleNewPart(')} function toggleNewPart(eid){tempParts.includes(eid)?tempParts.splice(tempParts.indexOf(eid),1):tempParts.push(eid);document.getElementById('newParts').innerHTML=employeeCheckboxes(tempParts,'toggleNewPart(')}

function weatherTextFromCode(code){
  const c=Number(code);
  if(c===0) return 'wolkenlos';
  if([1,2].includes(c)) return 'leicht bewölkt';
  if(c===3) return 'bedeckt';
  if([45,48].includes(c)) return 'neblig';
  if([51,53,55,56,57].includes(c)) return 'Nieselregen';
  if([61,63,65,66,67,80,81,82].includes(c)) return 'regnerisch';
  if([71,73,75,77,85,86].includes(c)) return 'Schneefall';
  if([95,96,99].includes(c)) return 'Gewitter';
  return 'wechselhaft';
}
function setWeatherFeedback(msg, ok=true){const el=document.getElementById('weatherFeedback'); if(el){el.textContent=msg; el.style.color=ok?'#2d7a36':'#9a3b00';}}
async function autoWeather(){ return autoWeatherFor('newWeather','weatherFeedback'); }
async function autoWeatherFor(inputId, feedbackId){
  const weatherInput=document.getElementById(inputId);
  const oldFeedback=document.getElementById('weatherFeedback');
  if(!weatherInput) return;
  const setFb=(msg,ok=true)=>{const el=document.getElementById(feedbackId); if(el){el.textContent=msg; el.style.color=ok?'#2d7a36':'#9a3b00';} else setWeatherFeedback(msg,ok)};
  if(!navigator.geolocation){setFb('⚠ Standortdaten werden von diesem Gerät/Browser nicht unterstützt.', false); return;}
  weatherInput.placeholder='Witterung wird ermittelt...';
  setFb('Standort wird abgefragt...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const lat=pos.coords.latitude.toFixed(5), lon=pos.coords.longitude.toFixed(5);
      setFb('Wetterdaten werden geladen...');
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,weather_code,wind_speed_10m&timezone=auto`;
      const r=await fetch(url);
      if(!r.ok) throw new Error('Wetterdienst nicht erreichbar');
      const data=await r.json();
      const cur=data.current||{};
      const temp=cur.temperature_2m;
      const wind=cur.wind_speed_10m;
      const precip=Number(cur.precipitation||0);
      const condition=weatherTextFromCode(cur.weather_code);
      const rain=precip>0 ? `Niederschlag ${precip} mm` : 'trocken';
      const parts=[];
      if(temp!==undefined) parts.push(`${Math.round(temp)} °C`);
      parts.push(condition);
      parts.push(rain);
      if(wind!==undefined) parts.push(`Wind ${Math.round(wind)} km/h`);
      weatherInput.value=parts.join(', ');
      setFb('✅ Witterung automatisch erfasst');
    }catch(e){setFb('⚠ Witterung konnte nicht automatisch geladen werden. Bitte manuell eintragen.', false);}
  }, err=>{
    setFb('⚠ Standortfreigabe nicht erteilt oder nicht verfügbar. Bitte Witterung manuell eintragen.', false);
  }, {enableHighAccuracy:false, timeout:10000, maximumAge:300000});
}

function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>reject(new Error('Datei konnte nicht gelesen werden.'));
    r.readAsDataURL(file);
  });
}
async function fileToData(file){
  const original=await readFileAsDataURL(file);
  if(!file || !String(file.type||'').startsWith('image/')) return original;
  try{
    const img=await new Promise((resolve,reject)=>{
      const image=new Image();
      image.onload=()=>resolve(image);
      image.onerror=()=>reject(new Error('Bild konnte nicht geladen werden.'));
      image.src=original;
    });
    const w=img.naturalWidth||img.width;
    const h=img.naturalHeight||img.height;
    if(!w || !h) return original;
    const maxEdge=1600;
    const scale=Math.min(1, maxEdge/Math.max(w,h));
    const canvas=document.createElement('canvas');
    canvas.width=Math.max(1, Math.round(w*scale));
    canvas.height=Math.max(1, Math.round(h*scale));
    const ctx=canvas.getContext('2d');
    if(!ctx) return original;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const compressed=await new Promise(resolve=>{
      if(canvas.toBlob){
        canvas.toBlob(blob=>{
          if(!blob){resolve(null);return;}
          const r=new FileReader();
          r.onload=()=>resolve(r.result);
          r.onerror=()=>resolve(null);
          r.readAsDataURL(blob);
        },'image/jpeg',0.82);
      }else{
        try{resolve(canvas.toDataURL('image/jpeg',0.82));}catch(e){resolve(null);}
      }
    });
    return compressed || original;
  }catch(e){
    console.warn('Bildkomprimierung fehlgeschlagen, nutze Original:', e);
    return original;
  }
}
// Skaliert ein einzelnes Foto so herunter, dass es exakt in die Protokoll-Box
// (max. 10,5 x 5,2 cm bei 96 DPI) passt, und erzeugt es per Canvas neu. Das neu
// kodierte JPEG hat keine DPI-Metadaten mehr und wird von Word in seiner nativen
// (= korrekten) Pixelgröße eingefügt. Dadurch sind alle Bilder im DOC gleich groß,
// unabhängig von Kamera, Quelle oder ursprünglicher DPI-Angabe.
async function normalizePhotoForDoc(dataUrl){
  const PHOTO_MAX_W_CM=10.5, PHOTO_MAX_H_CM=5.2, CM_TO_PX=37.7952755906; // 96 DPI
  const maxW=Math.round(PHOTO_MAX_W_CM*CM_TO_PX); // ~397 px
  const maxH=Math.round(PHOTO_MAX_H_CM*CM_TO_PX); // ~197 px
  try{
    const img=await new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>rej(new Error('Bild konnte nicht geladen werden.'));im.src=dataUrl;});
    const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
    if(!w||!h) return dataUrl;
    const scale=Math.min(maxW/w, maxH/h, 1);
    const tw=Math.max(1,Math.round(w*scale)), th=Math.max(1,Math.round(h*scale));
    const canvas=document.createElement('canvas');
    canvas.width=tw; canvas.height=th;
    const ctx=canvas.getContext('2d');
    if(!ctx) return dataUrl;
    ctx.drawImage(img,0,0,tw,th);
    try{return canvas.toDataURL('image/jpeg',0.82);}catch(e){return dataUrl;}
  }catch(e){console.warn('Foto-Normierung fehlgeschlagen, nutze Original:',e);return dataUrl;}
}

// Erzeugt eine Kopie der Begehung, in der alle Fotos auf DOC-Zielgröße normiert sind.
// Die Originaldaten im state bleiben unverändert (volle Qualität in der App).
async function inspectionWithNormalizedPhotos(i){
  const clone=JSON.parse(JSON.stringify(i));
  if(Array.isArray(clone.photos)){
    for(const ph of clone.photos){ if(ph&&ph.data) ph.data=await normalizePhotoForDoc(ph.data); }
  }
  if(Array.isArray(clone.findings)){
    for(const f of clone.findings){
      if(f&&Array.isArray(f.photos)){
        for(const ph of f.photos){ if(ph&&ph.data) ph.data=await normalizePhotoForDoc(ph.data); }
      }
    }
  }
  return clone;
}

        return {w:readU32BE(bin,16), h:readU32BE(bin,20)};
      }
      // JPEG: SOF-Marker suchen, dort stehen Höhe/Breite.
      if(bin.charCodeAt(0)===0xFF && bin.charCodeAt(1)===0xD8){
        let offset=2;
        while(offset+9<bin.length){
          if(bin.charCodeAt(offset)!==0xFF){offset++; continue;}
          let marker=bin.charCodeAt(offset+1);
          // Padding-FF überspringen.
          while(marker===0xFF && offset+2<bin.length){offset++; marker=bin.charCodeAt(offset+1);}
          if(marker===0xD8 || marker===0xD9){offset+=2; continue;}
          const len=readU16BE(bin,offset+2);
          if(!len || len<2) break;
          const sof=(marker>=0xC0 && marker<=0xC3) || (marker>=0xC5 && marker<=0xC7) || (marker>=0xC9 && marker<=0xCB) || (marker>=0xCD && marker<=0xCF);
          if(sof && offset+8<bin.length){
            const h=readU16BE(bin,offset+5);
            const w=readU16BE(bin,offset+7);
            if(w>0 && h>0) return {w,h};
          }
          offset+=2+len;
        }
      }
    }catch(e){console.warn('Bildmaße konnten nicht gelesen werden:', e);}
    return null;
  }

  function fitImageToDocxBox(dataUrl){
    const dim=getImageDimensionsFromDataUrl(dataUrl) || {w:4,h:3};
    const ratio=dim.w/dim.h;
    let w=PHOTO_MAX_W_CM;
    let h=w/ratio;
    if(h>PHOTO_MAX_H_CM){
      h=PHOTO_MAX_H_CM;
      w=h*ratio;
    }
    if(w>PHOTO_MAX_W_CM){
      w=PHOTO_MAX_W_CM;
      h=w/ratio;
    }
    // Word/HTML-Konverter arbeiten stabiler, wenn beide Maße explizit gesetzt sind.
    return {
      wCm:Number(w.toFixed(2)),
      hCm:Number(h.toFixed(2)),
      wPx:Math.max(1,Math.round(w*CM_TO_PX)),
      hPx:Math.max(1,Math.round(h*CM_TO_PX))
    };
  }

  function cleanFigureCaption(raw,f,fi){
    let txt=String(raw||'').trim();
    txt=txt.replace(/^\s*(Abbildung|Abb\.|Bild)\s*\d+\s*[:\-–]\s*/i,'').trim();
    const generic=/^(fotodokumentation|foto\s+zu|dokumentation|abbildung|übersicht\s+zur\s+feststellung|situation)/i;
    if(!txt || generic.test(txt) || /feststellung\s*\d+\.?$/i.test(txt)){
      txt=String((f&&f.title)||'').trim() || String((f&&f.measure)||'').trim() || ('Feststellung '+(fi+1));
    }
    txt=txt.replace(/\s+/g,' ').trim();
    if(txt && !/[.!?]$/.test(txt)) txt+='.';
    return txt;
  }

  function photoBlockHtml(imageData,captionText){
    const size=fitImageToDocxBox(imageData);
    const w=size.wCm+'cm';
    const h=size.hCm+'cm';
    // WICHTIG: Word liest in .doc-HTML die Bildgröße zuerst aus den HTML-Attributen
    // width/height und behandelt nackte Zahlen als Pixel, rechnet diese aber je nach
    // eingebetteter DPI des Fotos unterschiedlich um -> dasselbe Foto mal korrekt,
    // mal viel zu groß. Das Bild wird daher in fitImageToDocxBox bereits auf eine
    // feste Zielpixelgröße (96 DPI, passend zu den cm-Maßen) heruntergerechnet.
    // Hier werden BEIDE Angaben gesetzt: Pixel-Attribute (passend zur jetzt nativen
    // Bildgröße) UND cm im Style. Beide ergeben dieselbe physikalische Größe, sodass
    // Word unabhängig von DPI-Metadaten konsistent skaliert.
    const imgStyle='width:'+w+';height:'+h+';max-width:'+w+';max-height:'+h+';border:0!important;outline:0;display:block;margin:0;text-align:left;mso-position-horizontal:left;';

    // Tabellenzellen erzwingen in Word ein sauberes Stapeln (Bild oben, Unterschrift
    // darunter). Ohne diese Struktur behandelt Word das <img> als Zeilenelement und
    // die Unterschrift rutscht seitlich neben den unteren Bildrand.
    return '<table class="photo-block" cellspacing="0" cellpadding="0" border="0" '+
        'style="border-collapse:collapse;border:0;margin:0 0 6pt 0;width:'+w+';table-layout:fixed;page-break-inside:avoid;">'+

      '</td></tr>'+
      '<tr><td style="border:0;padding:2pt 0 0 0;margin:0;text-align:left;vertical-align:top;width:'+w+';">'+
        '<span class="photo-caption" style="font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.2;"><i>'+captionText+'</i></span>'+
      '</td></tr>'+
    '</table>';
  }

  const inspectionPhotos=(i.photos||[]).length
    ? '<h4>Fotos zur Begehung</h4>'+(i.photos||[]).map(ph=>
        photoBlockHtml(ph.data,'Abbildung '+(figIndex++)+': Übersichtsfoto zur Begehung. (Eigene Aufnahme am '+esc(i.date)+')')
      ).join('')
    : '';

  const findingPhotos=(i.findings||[]).map((f,fi)=>
    '<div class="finding-block">'+
      '<h4 class="finding-heading"><u>Feststellung '+(fi+1)+': '+esc(f.title)+'</u></h4>'+
      (f.photos||[]).map(ph=>{
        const rawCaption=(ai.captions||[])[captionIndex++];
        const caption='Abbildung '+(figIndex++)+': '+esc(cleanFigureCaption(rawCaption,f,fi))+' (Eigene Aufnahme am '+esc(i.date)+')';
        return photoBlockHtml(ph.data,caption);
      }).join('')+
    '</div>'
  ).join('');

  return `<!doctype html><html><head><meta charset='utf-8'><style>
    @page{size:21cm 29.7cm;margin:2.5cm 2.5cm 2.5cm 2.5cm;}
    body{font-family:Arial,Helvetica,sans-serif;font-size:11pt;text-align:justify;line-height:1.4;margin:0;color:#000;}
    p{font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.4;text-align:justify;margin:0 0 8pt 0;}
    table{width:100%;border-collapse:collapse;table-layout:auto;margin:0 0 10pt 0;}
    td{border:1px solid #999;padding:4.5pt 4.5pt;vertical-align:top;font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.2;height:auto;}
    .meta-table{width:100%;border-collapse:collapse;table-layout:auto;margin:0 0 10pt 0;}
    .meta-table td{padding:4.5pt 4.5pt;line-height:1.2;height:auto;}
    .meta-table td:first-child{font-weight:bold;white-space:nowrap;width:1%;}
    .meta-table td:nth-child(2){width:auto;}
    .distribution-table{width:100%;border-collapse:collapse;table-layout:auto;margin-top:4pt;}
    .red{border:2px solid #c00000;padding:10px;margin:8px 0;page-break-inside:avoid;font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.4;}
    .red ul{margin:0 0 0 18pt;padding-left:0;}
    .red li{margin:0 0 3pt 0;font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.4;}
    h2{font-family:Arial,Helvetica,sans-serif;font-size:16pt;font-weight:bold;page-break-after:avoid;margin:0 0 8pt 0;line-height:1.2;text-align:left;}
    h3{font-family:Arial,Helvetica,sans-serif;font-size:13pt;font-weight:bold;page-break-after:avoid;margin:12pt 0 6pt 0;line-height:1.2;text-align:left;}
    h4{font-family:Arial,Helvetica,sans-serif;font-size:11pt;font-weight:bold;page-break-after:avoid;margin:10pt 0 5pt 0;line-height:1.2;text-align:left;}
    h4.finding-heading{font-weight:normal;text-decoration:underline;}
    .photo-section{page-break-before:auto;break-before:auto;margin:0;padding:0;}

    table.photo-block{width:auto!important;border:0!important;border-collapse:collapse!important;margin:0 0 6pt 0!important;page-break-inside:avoid;}

  </style></head><body>

      <tr><td><b>Ort/Raum/Strecke:</b></td><td>${esc(p.location)}</td></tr>
      <tr><td><b>Anwesende/Teilnehmer:</b></td><td>${participants}</td></tr>

    <table class='signature-block'>

/* ============================================================
   GitHub Upload für Protokoll-Artefakte
   Vanilla JS, kein Backend, keine externen Libraries
   Speichert aus dieser App:
   UBÜ Protokolle/<JJJJ_MM_TT>/<Projektname>/
     protokoll.doc   (Word-kompatibles HTML-Dokument)
     bilder/foto1.jpg, foto2.jpg, ...
   Das DOC ist bewusst das bisherige Word-kompatible HTML-DOC-Format.
   ============================================================ */
const GH_CONFIG_STORAGE_KEY = 'ubb_github_upload_config_v1';
const GH_APP_DATA_PATH = 'App-Daten/ubb_daten.json';

function b64utf8(str){
  return btoa(unescape(encodeURIComponent(str)));
}

function blobToB64(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const result=String(reader.result||'');
      const comma=result.indexOf(',');
      if(comma<0){reject(new Error('Blob konnte nicht als DataURL gelesen werden.'));return;}
      resolve(result.slice(comma+1));
    };
    reader.onerror=()=>reject(new Error('Blob konnte nicht gelesen werden.'));
    reader.readAsDataURL(blob);
  });
}

function encodeGithubPath(path){
  return String(path).split('/').map(seg=>encodeURIComponent(seg)).join('/');
}

function dataUrlToB64(dataUrl){
  const s=String(dataUrl||'');
  const comma=s.indexOf(',');
  return comma>=0 ? s.slice(comma+1) : s;
}

function getGithubConfig(){
  try{
    const raw=localStorage.getItem(GH_CONFIG_STORAGE_KEY);
    if(!raw) return null;
    const cfg=JSON.parse(raw);
    return {ghOwner:(cfg.ghOwner||'').trim(),ghRepo:(cfg.ghRepo||'').trim(),ghToken:(cfg.ghToken||'').trim()};
  }catch(e){return null;}
}

function hasGithubConfig(){
  const cfg=getGithubConfig();
  return !!(cfg&&cfg.ghOwner&&cfg.ghRepo&&cfg.ghToken);
}

function githubConfigPanel(){
  const cfg=getGithubConfig()||{};
  const saved=hasGithubConfig();
  const savedMsg=flashTarget['github-config']
    ? `<span class="inline-success">${flashTarget['github-config']}</span>`
    : (saved ? `<span class="inline-success">✓ GitHub-Verbindung gespeichert</span>` : '');
  return `<hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
    <h3>GitHub-Upload</h3>
    <p class="muted">Speichert Protokolle als <b>DOC</b> unter <b>UBÜ Protokolle/JJJJ_MM_TT/Projektname</b> und sichert die zentrale App-Datensicherung direkt in dein GitHub-Repository. Der Token wird nicht in diese Datei geschrieben, sondern nur lokal in diesem Browser gespeichert.</p>
    <div class="grid">
      <div><label>GitHub-Benutzername / Owner</label><input id="ghOwnerInput" type="text" value="${escAttr(cfg.ghOwner||'')}" placeholder="z. B. dein-github-name" autocomplete="username"></div>
      <div><label>Repository-Name</label><input id="ghRepoInput" type="text" value="${escAttr(cfg.ghRepo||'')}" placeholder="z. B. begehungsprotokolle"></div>
    </div>
    <label>Fine-grained Personal Access Token</label>
    <input id="ghTokenInput" type="password" value="${escAttr(cfg.ghToken||'')}" placeholder="github_pat_..." autocomplete="off">
    <p class="muted">Der Token wird nur in diesem Browser im localStorage gespeichert. Auf dem Handy und auf dem PC musst du ihn jeweils einmal eintragen.</p>
    <div class="row">
      <button class="secondary" onclick="saveGithubConfigFromFields(event)">GitHub-Verbindung speichern</button>
      <button class="secondary" onclick="clearGithubConfig()">GitHub-Konfiguration löschen</button>
      ${savedMsg}
    </div>
    <p class="warn">Sicherheit: Der GitHub-Token gibt Schreibzugriff auf das freigegebene Repository. Nutze einen Fine-grained Personal Access Token nur für dieses eine Repository mit <b>Contents: Read and write</b>. Den Token niemals fest in eine öffentlich gehostete HTML-Datei schreiben.</p>`;
}

function saveGithubConfigFromFields(ev){
  if(ev) ev.preventDefault();
  const ghOwner=(document.getElementById('ghOwnerInput')?.value||'').trim();
  const ghRepo=(document.getElementById('ghRepoInput')?.value||'').trim();
  const ghToken=(document.getElementById('ghTokenInput')?.value||'').trim();
  if(!ghOwner || !ghRepo || !ghToken){
    toast('⚠ Bitte GitHub-Owner, Repository und Token eintragen.');
    return false;
  }
  localStorage.setItem(GH_CONFIG_STORAGE_KEY, JSON.stringify({ghOwner, ghRepo, ghToken}));
  saveArea('github-config','✅ GitHub-Verbindung gespeichert');
  return true;
}

function openGithubConfigDialog(){
  page='dataServer';
  state.activeInspectionId=null;
  render();
  setTimeout(()=>{
    document.getElementById('ghOwnerInput')?.focus();
    toast('Bitte GitHub-Daten in die Textfelder eintragen.');
  },50);
  return false;
}

function clearGithubConfig(){
  localStorage.removeItem(GH_CONFIG_STORAGE_KEY);
  if(page==='dataServer') render();
  setTimeout(()=>toast('✅ GitHub-Konfiguration wurde aus diesem Browser gelöscht.'),50);
}

function explainGithubError(error){
  const msg=String(error&&error.message?error.message:error);
  const lower=msg.toLowerCase();
  if(msg.includes('401')) return 'GitHub-Fehler 401: Token ungültig oder abgelaufen. Bitte neuen Token eintragen.';
  if(msg.includes('403') && lower.includes('resource not accessible')) return 'GitHub-Fehler 403: Resource not accessible by personal access token. Vermutlich fehlt Contents: Read and write oder das Repository ist im Token nicht freigegeben.';
  if(msg.includes('403')) return 'GitHub-Fehler 403: Zugriff verweigert. Bitte Token-Berechtigungen und Repository-Freigabe prüfen.';
  if(msg.includes('404')) return 'GitHub-Fehler 404: Repository oder Pfad nicht gefunden. Bitte Owner und Repository-Namen prüfen.';
  if(msg.includes('422')) return 'GitHub-Fehler 422: Datei konnte nicht erstellt/aktualisiert werden. Oft passiert das, wenn eine vorhandene Datei ohne korrekte SHA überschrieben werden soll.';
  return msg;
}

async function githubFetch(url, options){
  const res=await fetch(url, options);
  const text=await res.text();
  if(!res.ok){
    const shortText=text.length>800 ? text.slice(0,800)+'…' : text;
    throw new Error('GitHub API Fehler '+res.status+': '+shortText);
  }
  if(!text) return null;
  try{return JSON.parse(text);}catch(e){return text;}
}

async function ghPut(path, contentB64, message){
  const cfg=getGithubConfig();
  if(!cfg||!cfg.ghOwner||!cfg.ghRepo||!cfg.ghToken) throw new Error('GitHub-Konfiguration fehlt.');
  const encodedPath=encodeGithubPath(path);
  const url='https://api.github.com/repos/'+encodeURIComponent(cfg.ghOwner)+'/'+encodeURIComponent(cfg.ghRepo)+'/contents/'+encodedPath;
  const headers={
    'Authorization':'Bearer '+cfg.ghToken,
    'Accept':'application/vnd.github+json',
    'X-GitHub-Api-Version':'2022-11-28',
    'Content-Type':'application/json'
  };
  let sha=null;
  try{
    const existing=await githubFetch(url,{method:'GET',headers});
    if(existing&&existing.sha) sha=existing.sha;
  }catch(err){
    const m=String(err&&err.message?err.message:err);
    if(!m.includes('404')) console.warn('GitHub GET vor PUT fehlgeschlagen, versuche trotzdem PUT:', err);
  }
  const body={message, content:contentB64};
  if(sha) body.sha=sha;
  return githubFetch(url,{method:'PUT',headers,body:JSON.stringify(body)});
}

function getGithubProtocolDateParts(i){
  const raw=(i&&typeof i.date==='string') ? i.date.trim() : '';
  const match=raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(match){
    return {
      year:match[1],
      month:match[2],
      day:match[3],
      date:match[1]+'-'+match[2]+'-'+match[3],
      folder:match[1]+'_'+match[2]+'_'+match[3]
    };
  }
  const now=new Date();
  const year=String(now.getFullYear());
  const month=String(now.getMonth()+1).padStart(2,'0');
  const day=String(now.getDate()).padStart(2,'0');
  return {year, month, day, date:year+'-'+month+'-'+day, folder:year+'_'+month+'_'+day};
}

function cleanGithubTitle(raw){
  let title=String(raw||'').trim();
  if(!title || /^\(.*\)$/.test(title)) title=prompt('Titel für den GitHub-Ordner eingeben:', 'Protokoll') || 'Protokoll';
  title=String(title).replace(/[\\/:*?"<>|]/g,'_').replace(/\s+/g,' ').trim();
  if(!title) title='Protokoll';
  if(title.length>80) title=title.slice(0,80).trim();
  return title;
}

function collectGithubImages(i){
  const out=[];
  (i.photos||[]).forEach((ph,idx)=>out.push({b64:dataUrlToB64(ph.data), caption:ph.caption||('Übersichtsfoto '+(idx+1))}));
  (i.findings||[]).forEach((f,fi)=>{
    (f.photos||[]).forEach((ph,pi)=>out.push({b64:dataUrlToB64(ph.data), caption:ph.caption||('Feststellung '+(fi+1)+', Foto '+(pi+1))}));
  });
  return out.filter(x=>!!x.b64);
}

function getGithubSaveButton(btn){
  if(btn) return btn;
  const byId=document.getElementById('saveGithubBtn');
  if(byId) return byId;
  const byData=document.querySelector('[data-action="save-github"]');
  if(byData) return byData;
  if(document.activeElement && document.activeElement.tagName && document.activeElement.tagName.toLowerCase()==='button') return document.activeElement;
  return null;
}
function setGithubButtonState(button,text,disabled){
  if(!button) return;
  if(!button.dataset.originalText) button.dataset.originalText=button.textContent||'Nach GitHub speichern';
  button.textContent=text;
  button.disabled=!!disabled;
}
function resetGithubButton(button){
  if(!button) return;
  button.textContent=button.dataset.originalText||'Nach GitHub speichern';
  button.disabled=false;
}

async function saveProtocolToGithub(iid, triggerButton){
  const button=getGithubSaveButton(triggerButton);
  try{
    const i=byId(state.inspections,iid);
    if(!i){alert('Begehung nicht gefunden.'); return;}
    const p=byId(state.projects,i.projectId)||{};
    if(!hasGithubConfig()){
      page='dataServer';
      state.activeInspectionId=null;
      render();
      setTimeout(()=>{
        document.getElementById('ghOwnerInput')?.focus();
        toast('⚠ Bitte GitHub-Owner, Repository und Token eintragen und speichern.');
      },50);
      return;
    }
    setGithubButtonState(button,'Bereite Upload vor …',true);
    const dateParts=getGithubProtocolDateParts(i);
    const title=cleanGithubTitle(p.name||'Protokoll');
    const base='UBÜ Protokolle/'+dateParts.folder+'/'+title;
    const commitBase='Protokoll speichern: '+title+' ('+dateParts.date+')';

    setGithubButtonState(button,'Erzeuge Protokoll …',true);
    const ai=await generateTexts(i,p);
    const iDoc=await inspectionWithNormalizedPhotos(i);
    const html=protocolHtml(iDoc,p,ai);
    const allImages=collectGithubImages(i);

    setGithubButtonState(button,'Speichere … DOC',true);
    const docBlob=new Blob([html],{type:'application/msword;charset=utf-8'});
    await ghPut(base+'/protokoll.doc', await blobToB64(docBlob), commitBase+' - Word-Dokument');

    for(let idx=0; idx<allImages.length; idx++){
      setGithubButtonState(button,'Speichere … Bild '+(idx+1)+'/'+allImages.length,true);
      await ghPut(base+'/bilder/foto'+(idx+1)+'.jpg', allImages[idx].b64, commitBase+' - Foto '+(idx+1));
    }

    setGithubButtonState(button,'Sichere App-Daten …',true);
    save();
    const appBackup=buildAppDataBackup();
    await ghPut(
      GH_APP_DATA_PATH,
      b64utf8(JSON.stringify(appBackup,null,2)),
      'App-Daten sichern nach Protokollupload '+new Date().toLocaleString('de-DE')
    );

    setGithubButtonState(button,'Gespeichert ✓',true);
    alert('Protokoll und App-Daten erfolgreich nach GitHub gespeichert:\n\nProtokoll:\n'+base+'\n\nApp-Daten:\n'+GH_APP_DATA_PATH);
  }catch(err){
    console.error(err);
    alert('Speichern nach GitHub fehlgeschlagen:\n\n'+explainGithubError(err));
  }finally{
    setTimeout(()=>resetGithubButton(button),900);
  }
}

function b64ToUtf8(b64){
  const bin=atob(String(b64||'').replace(/\n/g,''));
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

async function ghGet(path){
  const cfg=getGithubConfig();
  if(!cfg||!cfg.ghOwner||!cfg.ghRepo||!cfg.ghToken) throw new Error('GitHub-Konfiguration fehlt.');
  const encodedPath=encodeGithubPath(path);
  const url='https://api.github.com/repos/'+encodeURIComponent(cfg.ghOwner)+'/'+encodeURIComponent(cfg.ghRepo)+'/contents/'+encodedPath;
  const headers={
    'Authorization':'Bearer '+cfg.ghToken,
    'Accept':'application/vnd.github+json',
    'X-GitHub-Api-Version':'2022-11-28'
  };
  return githubFetch(url,{method:'GET',headers});
}

function setPlainButtonState(button,text,disabled){
  if(!button) return;
  if(!button.dataset.originalText) button.dataset.originalText=button.textContent||'Speichern';
  button.textContent=text;
  button.disabled=!!disabled;
}
function resetPlainButton(button){
  if(!button) return;
  button.textContent=button.dataset.originalText||'Speichern';
  button.disabled=false;
}

function buildAppDataBackup(){
  // Keine geheimen Schlüssel in die GitHub-Sicherungsdatei schreiben.
  // Projektdaten, Mitarbeiter, Begehungen, Feststellungen und Fotos bleiben erhalten.
  const data=JSON.parse(JSON.stringify(state));
  if(data.settings){
    data.settings.apiKey='';
    data.settings.apiKeySaved=false;
  }
  return {
    backupVersion:1,
    erstellt:new Date().toISOString(),
    app:'UBB Begehungsprotokoll',
    storageKey:KEY,
    daten:data
  };
}

async function saveAppDataToGithub(triggerButton){
  const button=triggerButton||document.getElementById('saveAppDataGithubBtn');
  try{
    save();
    if(!hasGithubConfig()){
      openGithubConfigDialog();
      setTimeout(()=>toast('⚠ Bitte GitHub-Owner, Repository und Token eintragen und speichern.'),50);
      return;
    }
    setPlainButtonState(button,'Speichere App-Daten …',true);
    const backup=buildAppDataBackup();
    const json=JSON.stringify(backup,null,2);
    await ghPut(GH_APP_DATA_PATH, b64utf8(json), 'App-Daten sichern '+new Date().toLocaleString('de-DE'));
    setPlainButtonState(button,'Gespeichert ✓',true);
    flashTarget['github-app-data']='✅ App-Daten in GitHub gespeichert';
    render();
    setTimeout(()=>{delete flashTarget['github-app-data']; if(page==='dataServer') render();},2200);
  }catch(err){
    console.error(err);
    alert('App-Daten konnten nicht nach GitHub gespeichert werden:\n\n'+explainGithubError(err));
  }finally{
    setTimeout(()=>resetPlainButton(button),900);
  }
}

async function restoreAppDataFromGithub(triggerButton){
  const button=triggerButton||document.getElementById('loadAppDataGithubBtn');
  try{
    if(!hasGithubConfig()){
      openGithubConfigDialog();
      setTimeout(()=>toast('⚠ Bitte GitHub-Owner, Repository und Token eintragen und speichern.'),50);
      return;
    }
    if(!confirm('App-Daten wirklich aus GitHub wiederherstellen?\n\nDie aktuell im Browser gespeicherten Daten werden ersetzt.')) return;
    setPlainButtonState(button,'Lade App-Daten …',true);
    const file=await ghGet(GH_APP_DATA_PATH);
    if(!file || !file.content) throw new Error('Die GitHub-Sicherungsdatei enthält keinen lesbaren Inhalt.');
    const text=b64ToUtf8(file.content);
    const parsed=JSON.parse(text);
    const restored=parsed && parsed.daten ? parsed.daten : parsed;
    if(!restored || typeof restored!=='object' || !Array.isArray(restored.projects) || !Array.isArray(restored.inspections)){
      throw new Error('Die Datei App-Daten/ubb_daten.json passt nicht zur App-Datenstruktur.');
    }
    state=restored;
    if(!state.settings) state.settings={apiKey:'',apiKeySaved:false,model:'gpt-4o-mini'};
    if(state.settings.apiKeySaved===undefined) state.settings.apiKeySaved=!!state.settings.apiKey;
    if(!state.company) state.company={name:'',address:'',phone:'',email:'',website:'',open:true};
    if(state.company.open===undefined) state.company.open=!state.company.name;
    state.activeInspectionId=null;
    page='home';
    save();
    render();
    setTimeout(()=>toast('✅ App-Daten aus GitHub wiederhergestellt.'),50);
  }catch(err){
    console.error(err);
    alert('App-Daten konnten nicht aus GitHub wiederhergestellt werden:\n\n'+explainGithubError(err));
  }finally{
    setTimeout(()=>resetPlainButton(button),900);
  }
}

async function saveToGithub(){
  if(state.activeInspectionId) return saveProtocolToGithub(state.activeInspectionId);
  alert('Bitte öffne zuerst eine Begehung und klicke dort auf „Nach GitHub speichern“.');
}

function exportData(){downloadBlob(JSON.stringify(state,null,2),'ubb_daten.json','application/json')} async function importData(file){if(!file)return;state=JSON.parse(await file.text());save();render()} function downloadBlob(content,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function employeeCheckboxes(selected,prefix){return state.employees.map(e=>`<label class="pill"><input type="checkbox" ${selected.includes(e.id)?'checked':''} onchange="${prefix}'${e.id}')"> ${esc(e.name||'Mitarbeiter')}</label>`).join('')||'<p class="muted">Noch keine Mitarbeiter angelegt.</p>'}
function inp(label,path,type='text'){return `<label>${label}</label><input type="${type}" data-path="${path}" value="${esc(path.split('.').reduce((o,k)=>o?.[k],state))}">`} function ta(label,path){return `<label>${label}</label><textarea data-path="${path}">${esc(path.split('.').reduce((o,k)=>o?.[k],state))}</textarea>`} function rawInp(label,val,onchange){let type=onchange==='date'?'date':'text', oc=onchange&&onchange!=='date'?`oninput="${onchange}"`:'';return `<div><label>${label}</label><input type="${type}" value="${esc(val)}" ${oc}></div>`} function rawTa(label,val,onchange){let oc=onchange?`oninput="${onchange}"`:'';return `<label>${label}</label><textarea ${oc}>${esc(val)}</textarea>`}
function bindInputs(){document.querySelectorAll('[data-path]').forEach(el=>el.oninput=()=>{let parts=el.dataset.path.split('.'),o=state;while(parts.length>1)o=o[parts.shift()];o[parts[0]]=el.value;save()})}
render();
</script>
